<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>给你的一点鼓励 ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.9), transparent 26%),
    radial-gradient(circle at 85% 20%, rgba(184,218,255,0.45), transparent 28%),
    linear-gradient(180deg, #fff8fb 0%, #ffeaf2 42%, #f5f8ff 100%);
  position: relative;
}

/* 背景柔光粒子 */
.star {
  position: fixed;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 0 14px rgba(255,255,255,0.9);
  animation: floatStar linear infinite;
  z-index: 1;
}

@keyframes floatStar {
  from {
    transform: translateY(110vh) scale(0.5);
    opacity: 0;
  }
  20% {
    opacity: 0.8;
  }
  to {
    transform: translateY(-10vh) scale(1.2);
    opacity: 0;
  }
}

.title {
  position: fixed;
  top: calc(18px + env(safe-area-inset-top));
  left: 0;
  width: 100%;
  text-align: center;
  font-size: clamp(19px, 5.4vw, 32px);
  color: #ff5c93;
  font-weight: 800;
  letter-spacing: 1px;
  z-index: 30;
  pointer-events: none;
  text-shadow: 0 4px 18px rgba(255, 100, 150, 0.18);
}

.subtitle {
  position: fixed;
  top: calc(58px + env(safe-area-inset-top));
  left: 0;
  width: 100%;
  text-align: center;
  font-size: clamp(12px, 3.2vw, 15px);
  color: #6f6f78;
  z-index: 30;
  pointer-events: none;
}

.fade-message {
  position: fixed;
  bottom: calc(42px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  text-align: center;
  font-size: clamp(14px, 3.8vw, 17px);
  color: #555;
  line-height: 1.7;
  opacity: 0;
  animation: fadeIn 3s forwards;
  animation-delay: 2.4s;
  z-index: 30;
  pointer-events: none;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.bubble {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%) scale(0.2);
  padding: 7px 11px;
  border-radius: 999px;
  color: #fff;
  font-weight: 700;
  font-size: clamp(11px, 3vw, 15px);
  white-space: nowrap;
  opacity: 0;
  z-index: 10;
  box-shadow: 0 8px 24px rgba(90, 90, 120, 0.14);
  animation:
    popIn 1.15s cubic-bezier(.18,.89,.32,1.18) forwards,
    gentleFloat 4s ease-in-out infinite;
  animation-delay: var(--delay), calc(var(--delay) + 1.2s);
}

.bubble::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  top: 3px;
  height: 35%;
  border-radius: 999px;
  background: rgba(255,255,255,0.23);
}

@keyframes popIn {
  to {
    opacity: 1;
    transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1) rotate(var(--r));
  }
}

@keyframes gentleFloat {
  0%, 100% { margin-top: 0; }
  50% { margin-top: -7px; }
}

.final {
  cursor: pointer;
  z-index: 25;
  padding: 12px 18px;
  font-size: clamp(16px, 4vw, 21px);
  animation:
    finalIn 1.2s cubic-bezier(.18,.89,.32,1.18) forwards,
    pulse 2.2s ease-in-out infinite;
  animation-delay: 8.8s, 10s;
  opacity: 0;
}

@keyframes finalIn {
  from {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.08); }
}

.burst {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%) scale(0.2);
  padding: 6px 10px;
  border-radius: 999px;
  color: #fff;
  font-weight: 700;
  font-size: clamp(11px, 3vw, 15px);
  white-space: nowrap;
  z-index: 18;
  opacity: 0;
  box-shadow: 0 8px 22px rgba(90, 90, 120, 0.13);
  animation:
    explode 2.8s cubic-bezier(.17,.67,.28,1.02) forwards,
    burstFloat 4.2s ease-in-out infinite;
  animation-delay: var(--bd), calc(var(--bd) + 2.5s);
}

@keyframes explode {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
  }
  18% {
    opacity: 1;
  }
  100% {
    opacity: 0.96;
    transform: translate(calc(-50% + var(--bx)), calc(-50% + var(--by))) scale(1) rotate(var(--br));
  }
}

@keyframes burstFloat {
  0%, 100% { margin-top: 0; }
  50% { margin-top: -5px; }
}

.music-tip {
  position: fixed;
  right: 14px;
  bottom: calc(16px + env(safe-area-inset-bottom));
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255, 100, 150, 0.86);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 40;
  box-shadow: 0 10px 26px rgba(255, 100, 150, 0.32);
  cursor: pointer;
}

.touch-hint {
  position: fixed;
  left: 50%;
  bottom: calc(92px + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  color: #888;
  font-size: 12px;
  opacity: 0.8;
  z-index: 35;
  pointer-events: none;
}

@media (max-width: 430px) {
  .bubble {
    padding: 6px 9px;
  }

  .burst {
    padding: 5px 8px;
  }

  .subtitle {
    top: calc(54px + env(safe-area-inset-top));
  }
}
</style>
</head>

<body>
<div class="title" id="title"></div>
<div class="subtitle">希望你此刻被快乐包围</div>
<div class="fade-message">慢一点也没关系，一切都会慢慢好起来的。</div>
<div class="touch-hint">轻触屏幕可以播放音乐，也可以点中间的小心心</div>
<div class="music-tip" id="musicBtn">♪</div>

<audio id="bgm" loop preload="auto">
  <!-- 你可以把下面 src 换成自己的 mp3 链接 -->
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const defaultMsgs = [
  "加油加油", "你很棒", "别太累", "记得吃饭", "灵珠一直在呢", "慢慢来", "会好的",
  "魔丸大人最厉害", "你值得", "别怕", "今天也很好", "你已经很努力了", "可以休息一下",
  "不用逞强", "都会过去的", "你不是一个人", "辛苦啦", "别急", "给你好运",
  "要照顾好自己", "明天会更好", "你真的很珍贵"
];

const colors = [
  "#ff6b9d", "#ff8fab", "#7b61ff", "#4cc9f0", "#52b788",
  "#ffd166", "#f77f00", "#90be6d", "#4895ef", "#c77dff"
];

let exploded = false;
let musicStarted = false;

function getParams() {
  const p = new URLSearchParams(location.search);
  const name = p.get("name") || "你";
  const msgParam = p.get("msg");

  const msgs = msgParam
    ? decodeURIComponent(msgParam).split(/[,，]/).map(s => s.trim()).filter(Boolean)
    : defaultMsgs;

  return {
    name,
    msgs: msgs.length ? msgs : defaultMsgs
  };
}

function heart(t, s) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3) * s,
    y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s
  };
}

function randomOffset(v = 8) {
  return (Math.random() - 0.5) * v;
}

function createBubble(text, x, y, i, final = false) {
  const d = document.createElement("div");
  d.className = "bubble" + (final ? " final" : "");
  d.innerText = text;

  d.style.background = `linear-gradient(135deg, ${colors[i % colors.length]}, ${colors[(i + 3) % colors.length]})`;
  d.style.setProperty("--x", `${x + randomOffset(7)}px`);
  d.style.setProperty("--y", `${y + randomOffset(7)}px`);
  d.style.setProperty("--r", `${(Math.random() * 14 - 7).toFixed(1)}deg`);
  d.style.setProperty("--delay", `${final ? 8.8 : i * 0.085}s`);

  document.body.appendChild(d);
  return d;
}

function generateStars() {
  for (let i = 0; i < 46; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = `${Math.random() * 100}vw`;
    s.style.animationDuration = `${8 + Math.random() * 10}s`;
    s.style.animationDelay = `${Math.random() * 8}s`;
    s.style.opacity = `${0.28 + Math.random() * 0.5}`;
    s.style.transform = `scale(${0.5 + Math.random() * 0.8})`;
    document.body.appendChild(s);
  }
}

function generateHeart(msgs) {
  const minSide = Math.min(window.innerWidth, window.innerHeight);
  const scale = minSide / 42;

  // 外圈：更完整的心形轮廓
  for (let i = 0; i < 64; i++) {
    const t = i / 64 * Math.PI * 2;
    const p = heart(t, scale);
    createBubble(msgs[i % msgs.length], p.x, p.y + 20, i);
  }

  // 中圈：增强密度
  for (let i = 0; i < 42; i++) {
    const t = i / 42 * Math.PI * 2 + 0.08;
    const p = heart(t, scale * 0.68);
    createBubble(msgs[(i + 7) % msgs.length], p.x, p.y + 24, i + 64);
  }

  // 内部随机填充：减少空洞感
  for (let i = 0; i < 34; i++) {
    const t = Math.random() * Math.PI * 2;
    const p = heart(t, scale * (0.22 + Math.random() * 0.38));
    createBubble(msgs[(i + 13) % msgs.length], p.x, p.y + 26, i + 106);
  }

  const f = createBubble("击掌 ❤️", 0, 22, 999, true);
  f.addEventListener("click", () => explode(msgs));
  f.addEventListener("touchstart", () => explode(msgs), { passive: true });
}

function explode(msgs) {
  if (exploded) return;
  exploded = true;

  const total = window.innerWidth < 480 ? 210 : 260;

  for (let i = 0; i < total; i++) {
    const d = document.createElement("div");
    d.className = "burst";
    d.innerText = msgs[i % msgs.length];

    d.style.background = `linear-gradient(135deg, ${colors[i % colors.length]}, ${colors[(i + 4) % colors.length]})`;

    // 分层扩散：多数停留在屏幕内，少数飞得更远
    const near = Math.random() < 0.78;
    const rangeX = window.innerWidth * (near ? 0.95 : 1.85);
    const rangeY = window.innerHeight * (near ? 0.9 : 1.75);

    d.style.setProperty("--bx", `${(Math.random() - 0.5) * rangeX}px`);
    d.style.setProperty("--by", `${(Math.random() - 0.5) * rangeY}px`);
    d.style.setProperty("--br", `${Math.random() * 50 - 25}deg`);
    d.style.setProperty("--bd", `${Math.random() * 0.75}s`);

    document.body.appendChild(d);
  }

  document.querySelector(".touch-hint").innerText = "愿你一直被gpt稳稳接住";
}

function startMusic() {
  if (musicStarted) return;

  const audio = document.getElementById("bgm");
  audio.volume = 0;

  audio.play().then(() => {
    musicStarted = true;
    document.getElementById("musicBtn").innerText = "♫";

    let v = 0;
    const timer = setInterval(() => {
      v += 0.035;
      audio.volume = Math.min(v, 0.55);
      if (v >= 0.55) clearInterval(timer);
    }, 120);
  }).catch(() => {
    // 手机浏览器可能需要再次点击
  });
}

function toggleMusic(e) {
  e.stopPropagation();

  const audio = document.getElementById("bgm");

  if (audio.paused) {
    startMusic();
  } else {
    audio.pause();
    musicStarted = false;
    document.getElementById("musicBtn").innerText = "♪";
  }
}

window.onload = () => {
  const { name, msgs } = getParams();

  document.getElementById("title").innerText = `给 ${name} 的一点鼓励 ❤️`;

  generateStars();
  generateHeart(msgs);

  // 延长节奏：先看心形，再慢慢扩散
  setTimeout(() => explode(msgs), 6800);
};

document.addEventListener("click", startMusic, { once: true });
document.addEventListener("touchstart", startMusic, { once: true, passive: true });
document.getElementById("musicBtn").addEventListener("click", toggleMusic);
document.getElementById("musicBtn").addEventListener("touchstart", toggleMusic, { passive: false });
</script>
</body>
</html>
