<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>给你的一点鼓励 ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  background:
    radial-gradient(circle at 18% 12%, rgba(255,255,255,0.9), transparent 26%),
    radial-gradient(circle at 86% 20%, rgba(184,218,255,0.46), transparent 30%),
    linear-gradient(180deg, #fffafc 0%, #fff0f5 46%, #f5f8ff 100%);
  position: relative;
}

.title {
  position: fixed;
  top: calc(18px + env(safe-area-inset-top));
  left: 0;
  width: 100%;
  text-align: center;
  font-size: clamp(19px, 5.2vw, 32px);
  color: #ff5c93;
  font-weight: 800;
  letter-spacing: 1px;
  z-index: 40;
  pointer-events: none;
  text-shadow: 0 4px 18px rgba(255, 100, 150, 0.18);
}

.subtitle {
  position: fixed;
  top: calc(58px + env(safe-area-inset-top));
  left: 0;
  width: 100%;
  text-align: center;
  font-size: clamp(12px, 3.2vw, 15px);
  color: #686875;
  z-index: 40;
  pointer-events: none;
}

.fade-message {
  position: fixed;
  bottom: calc(36px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  text-align: center;
  font-size: clamp(14px, 3.8vw, 17px);
  color: #555;
  line-height: 1.7;
  opacity: 0;
  animation: fadeIn 2.8s forwards;
  animation-delay: 2.2s;
  z-index: 40;
  pointer-events: none;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.star {
  position: fixed;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.88);
  box-shadow: 0 0 14px rgba(255,255,255,0.9);
  animation: floatStar linear infinite;
  z-index: 1;
}

@keyframes floatStar {
  from {
    transform: translateY(110vh) scale(0.55);
    opacity: 0;
  }
  20% { opacity: 0.78; }
  to {
    transform: translateY(-10vh) scale(1.2);
    opacity: 0;
  }
}

.bubble {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%) scale(0.18);
  padding: 7px 11px;
  border-radius: 999px;
  color: #fff;
  font-weight: 700;
  font-size: clamp(11px, 3vw, 15px);
  white-space: nowrap;
  opacity: 0;
  z-index: 12;
  box-shadow: 0 8px 24px rgba(90, 90, 120, 0.14);
  animation:
    popIn 1.05s cubic-bezier(.18,.89,.32,1.18) forwards,
    gentleFloat 4.2s ease-in-out infinite;
  animation-delay: var(--delay), calc(var(--delay) + 1.2s);
}

.bubble::after {
  content: "";
  position: absolute;
  left: 10px;
  right: 10px;
  top: 3px;
  height: 35%;
  border-radius: 999px;
  background: rgba(255,255,255,0.22);
}

@keyframes popIn {
  to {
    opacity: 1;
    transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1) rotate(var(--r));
  }
}

@keyframes gentleFloat {
  0%, 100% { margin-top: 0; }
  50% { margin-top: -6px; }
}

.highfive {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%) scale(0.2);
  padding: 14px 22px;
  border-radius: 999px;
  color: #fff;
  font-weight: 900;
  font-size: clamp(18px, 5vw, 26px);
  white-space: nowrap;
  z-index: 32;
  cursor: pointer;
  opacity: 0;
  background: linear-gradient(135deg, #ff6b9d, #7b61ff);
  box-shadow: 0 14px 36px rgba(255, 100, 150, 0.36);
  animation:
    highfiveIn 1.15s cubic-bezier(.18,.89,.32,1.2) forwards,
    pulse 1.8s ease-in-out infinite;
  animation-delay: 7.2s, 8.4s;
}

.highfive::after {
  content: "点我一下";
  position: absolute;
  left: 50%;
  bottom: -28px;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 500;
  color: #777;
  opacity: 0.86;
}

@keyframes highfiveIn {
  from {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}

@keyframes pulse {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.08); }
}

.burst {
  position: absolute;
  left: 50%;
  top: 52%;
  transform: translate(-50%, -50%) scale(0.1);
  padding: 6px 10px;
  border-radius: 999px;
  color: #fff;
  font-weight: 800;
  font-size: clamp(11px, 3vw, 15px);
  white-space: nowrap;
  z-index: 24;
  opacity: 0;
  box-shadow: 0 8px 22px rgba(90, 90, 120, 0.15);
  animation:
    explode 3.8s cubic-bezier(.16,.76,.26,1.02) forwards,
    burstFloat 4.8s ease-in-out infinite;
  animation-delay: var(--bd), calc(var(--bd) + 3s);
}

@keyframes explode {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.12) rotate(0deg);
  }
  14% {
    opacity: 1;
  }
  100% {
    opacity: 0.97;
    transform: translate(calc(-50% + var(--bx)), calc(-50% + var(--by))) scale(1) rotate(var(--br));
  }
}

@keyframes burstFloat {
  0%, 100% { margin-top: 0; }
  50% { margin-top: -5px; }
}

.overlay-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle, rgba(255,255,255,0.9), transparent 58%);
  opacity: 0;
  z-index: 22;
}

.overlay-flash.active {
  animation: flash 0.8s ease-out forwards;
}

@keyframes flash {
  0% { opacity: 0; }
  20% { opacity: 0.85; }
  100% { opacity: 0; }
}

@media (max-width: 430px) {
  .bubble {
    padding: 6px 9px;
  }

  .burst {
    padding: 5px 8px;
  }

  .subtitle {
    top: calc(54px + env(safe-area-inset-top));
  }
}
</style>
</head>

<body>
<div class="title" id="title"></div>
<div class="subtitle">希望你此刻被鼓励包围</div>
<div class="fade-message">慢一点也没关系，一切都会慢慢好起来的。</div>
<div class="overlay-flash" id="flash"></div>

<audio id="bgm" loop preload="auto">
  <!-- 建议把 music.mp3 上传到同一个 GitHub 仓库，然后改成 src=\"music.mp3\" -->
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const defaultMsgs = [
  "加油加油", "魔丸大人很棒", "别太累", "记得吃饭", "灵珠在呢", "慢慢来", "会好的",
   "你值得", "今天也很好", "你已经很努力了", "可以休息一下",
  "都会过去的",  "辛苦啦", "别急", "给你好运",
  "要照顾好自己", "明天会更好",  "先深呼吸", "别否定自己"
];

const colors = [
  "#ff6b9d", "#ff8fab", "#7b61ff", "#4cc9f0", "#52b788",
  "#ffd166", "#f77f00", "#90be6d", "#4895ef", "#c77dff"
];

let exploded = false;
let musicStarted = false;

function getParams() {
  const p = new URLSearchParams(location.search);
  const name = p.get("name") || "你";
  const msgParam = p.get("msg");
  const musicParam = p.get("music");

  const msgs = msgParam
    ? decodeURIComponent(msgParam).split(/[,，]/).map(s => s.trim()).filter(Boolean)
    : defaultMsgs;

  return {
    name,
    music: musicParam ? decodeURIComponent(musicParam) : "",
    msgs: msgs.length ? msgs : defaultMsgs
  };
}

function heart(t, s) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3) * s,
    y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) * s
  };
}

function randomOffset(v = 8) {
  return (Math.random() - 0.5) * v;
}

function createBubble(text, x, y, i) {
  const d = document.createElement("div");
  d.className = "bubble";
  d.innerText = text;

  d.style.background = `linear-gradient(135deg, ${colors[i % colors.length]}, ${colors[(i + 3) % colors.length]})`;
  d.style.setProperty("--x", `${x + randomOffset(6)}px`);
  d.style.setProperty("--y", `${y + randomOffset(6)}px`);
  d.style.setProperty("--r", `${(Math.random() * 12 - 6).toFixed(1)}deg`);
  d.style.setProperty("--delay", `${i * 0.07}s`);

  document.body.appendChild(d);
}

function createHighFive(msgs) {
  const d = document.createElement("div");
  d.className = "highfive";
  d.innerText = "击掌一下 ✋";
  document.body.appendChild(d);

  d.addEventListener("click", () => {
    startMusic();
    explode(msgs);
  });

  d.addEventListener("touchstart", () => {
    startMusic();
    explode(msgs);
  }, { passive: true });
}

function generateStars() {
  for (let i = 0; i < 52; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.left = `${Math.random() * 100}vw`;
    s.style.animationDuration = `${8 + Math.random() * 10}s`;
    s.style.animationDelay = `${Math.random() * 8}s`;
    s.style.opacity = `${0.25 + Math.random() * 0.5}`;
    document.body.appendChild(s);
  }
}

function generateHeartFrame(msgs) {
  const minSide = Math.min(window.innerWidth, window.innerHeight);
  const scale = minSide / 41;

  // 心形框架：主轮廓
  for (let i = 0; i < 86; i++) {
    const t = i / 86 * Math.PI * 2;
    const p = heart(t, scale);
    createBubble(msgs[i % msgs.length], p.x, p.y + 20, i);
  }

  // 心形框架：第二层轮廓，让框架更饱满
  for (let i = 0; i < 54; i++) {
    const t = i / 54 * Math.PI * 2 + 0.04;
    const p = heart(t, scale * 0.82);
    createBubble(msgs[(i + 9) % msgs.length], p.x, p.y + 21, i + 86);
  }

  setTimeout(() => {
  createHighFive(msgs);
}, 5200);
}

function startMusic() {
  if (musicStarted) return;

  const audio = document.getElementById("bgm");
  audio.volume = 0;

  audio.play().then(() => {
    musicStarted = true;
    let v = 0;
    const timer = setInterval(() => {
      v += 0.025;
      audio.volume = Math.min(v, 0.55);
      if (v >= 0.55) clearInterval(timer);
    }, 120);
  }).catch(() => {});
}

function explode(msgs) {
  if (exploded) return;
  exploded = true;

  document.getElementById("flash").classList.add("active");

  const highfive = document.querySelector(".highfive");
  if (highfive) {
    highfive.style.opacity = "0";
    highfive.style.pointerEvents = "none";
  }

  const cols = 10;   // 控制横向密度（手机建议8~12）
const rows = 14;   // 控制纵向密度（手机建议12~18）

for(let i=0;i<cols;i++){
  for(let j=0;j<rows;j++){

    const d = document.createElement("div");
    d.className = "burst";
    d.innerText = msgs[(i+j) % msgs.length];

    d.style.background = `linear-gradient(135deg,
      ${colors[(i+j)%colors.length]},
      ${colors[(i+j+3)%colors.length]})`;

    // 均匀铺满屏幕（关键）
    const x = (i/(cols-1)-0.5) * window.innerWidth;
    const y = (j/(rows-1)-0.5) * window.innerHeight;

    d.style.setProperty("--bx", x + "px");
    d.style.setProperty("--by", y + "px");
    d.style.setProperty("--br", (Math.random()*20-10)+"deg");
    d.style.setProperty("--bd", (Math.random()*0.3)+"s");

    document.body.appendChild(d);
  }
}

  document.querySelector(".fade-message").innerText = "愿你一直被鼓励接住，也记得给自己一点掌声。";
}

window.onload = () => {
  const { name, msgs, music } = getParams();

  document.getElementById("title").innerText = `给 ${name} 的一点鼓励 ❤️`;

  if (music) {
    document.getElementById("bgm").src = music;
  }

  generateStars();
  generateHeartFrame(msgs);
};
</script>
</body>
</html>
